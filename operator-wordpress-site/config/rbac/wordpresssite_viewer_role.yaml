# permissions for end users to view wordpresssites.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wordpresssite-viewer-role
rules:
- apiGroups:
  - wordpress.epfl.ch
  resources:
  - wordpresssites
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - wordpress.epfl.ch
  resources:
  - wordpresssites/status
  verbs:
  - get
