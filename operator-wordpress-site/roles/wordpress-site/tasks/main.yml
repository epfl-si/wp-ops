# file: roles/wordpress-instance/tasks/main.yml
#
# What to do to install and configure a WordPress instance
#

- name: Backup
  when: >-
    (wp_do_backup | default(True) | bool)
    or
    ("wp.backup" in ansible_run_tags)
  tags:
    - never  # That is, skip unless "-t wp.wipe" or "-t wp.backup" is
             # passed on the command line
    - wp.wipe
    - wp.backup
  include_tasks:
    file: "backup.yml"
    apply:
      # Tags don't auto-inherit with `include_tasks`:
      tags:
        - wp.wipe
        - wp.backup

- name: Wipe
  import_tasks: "wipe.yml"
  tags:
    - never
    - wp.wipe

- name: Update memento gutenberg blocks
  import_tasks: "update-memento-blocks.yml"
  tags:
    - never
    - wp.update_memento_block

- wordpress_facts:
  tags: always

- name: "{{ 'Recreate' if 'wp.wipe' in ansible_run_tags else 'Create' }}"
  when: site_is_not_deleted_in_wpveritas
  tags:
    - wp
    - wp.restore
    - wp.create
  include_tasks:
    file: "create.yml"
    apply:
      tags:
        - wp
        - wp.create
        - wp.restore

- name: Per site route
  tags:
    - wp
    - wp.route
  include_tasks:
    file: "routes.yml"
    apply:
      tags:
        - wp.route

- name: Restore
  include_tasks:
    file: "restore.yml"
    apply:
      tags:
        - wp.restore
  tags:
    - never
    - wp.restore
    - wp.restore.files
    - wp.restore.sql

- name: Configure
  when: site_is_not_deleted_in_wpveritas
  tags:
    - wp
    - wp.configure
  include_tasks:    # Required because of the "when" clause
    file: "configure.yml"
    # Because `include_tasks` is dynamic, tags don't auto-inherit.
    apply:
      tags:
        - wp
        - wp.configure

- name: Set up access
  tags:
    - wp
    - wp.access
  include_tasks:
    file: "access.yml"
    apply:
      tags:
        - wp
        - wp.access

- name: Set up metadata
  when: site_is_not_deleted_in_wpveritas
  tags:
    - wp
    - wp.metadata
  include_tasks:
    file: "site-metadata.yml"
    apply:
      tags:
        - wp
        - wp.metadata

- name: Set up plugins
  when: site_is_not_deleted_in_wpveritas
  tags:
    - wp
    - wp.plugins
    - wp.plugins.wp_media_folder_options
    - wp.plugins.epfl-coming-soon
    - wp.plugins.coming-soon
    - wp.plugins.epfl-coming-soon
    - wp.plugins.unknown
    - wp.plugins.polylang
    - wp.plugins.wpforms
    - wp.plugins.wpforms-surveys-polls
    - wp.plugins.cachecontrol
    - wp.plugins.payonline
    - wp.plugins.ewww
    - wp.plugins.ewww.optimize
    - wp.plugins.ewww.configure
    - wp.plugins.intranet
    - wp.plugins.intranet.htaccess
    - wp.plugins.pdf
    - wp.plugins.restauration.options
    - wp.plugins.mu
    - wp.plugins.mu.social-graph
    - wp.plugins.wp-gutenberg
    # OBSOLETE aliases:
    - plugins
    - plugins.wp_media_folder_options
    - plugins.unknown
    - plugins.polylang
    - plugins.intranet
    - plugins.intranet.htaccess
  include_tasks:
    file: "plugins.yml"
    apply:
      tags:
        - wp
        - wp.plugins
        - plugins

- name: Set up themes
  when: site_is_not_deleted_in_wpveritas
  tags:
    - wp
    - wp.themes
    # OBSOLETE alias:
    - themes
  include_tasks:
    file: "themes.yml"
    apply:
      tags:
        - wp
        - wp.themes
        - themes

- name: Delete sample pages and posts installed by WordPress
  when: site_is_not_deleted_in_wpveritas
  include_tasks:
    file: "samples.yml"
    apply:
      tags:
        - wp
        - wp.samples
  tags:
    - wp
    - wp.samples

- name: Set up menus
  when: site_is_not_deleted_in_wpveritas
  include_tasks:
    file: "menus.yml"
    apply:
      tags:
        - wp
        - wp.menus
        - wp.menus.refresh
  tags:
    - wp
    - wp.menus
    - wp.menus.refresh

- name: Generate reports locally
  include_tasks:
    file: "reports.yml"
    apply:
      tags: ["wp.reports"]
  tags:
    - never
    - wp.reports
    - wp.reports.options
    - wp.reports.search_content
