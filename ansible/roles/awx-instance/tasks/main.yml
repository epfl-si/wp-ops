- tags: always
  include_vars: "{{ item }}"
  with_items:
  - awx-vars.yml
  - wp-veritas-vars.yml

# - name: "Persistent Volume Claim"
#   import_tasks: persistent-volume-claim.yml
#   delegate_to: localhost
#   tags:
#     - awx
#     - awx.pvc

- name: "AWX images and build configs on {{ awx_build_namespace }}"
  when: "ansible_oc_namespace == awx_build_namespace"
  include_tasks:
    file: awx-builds.yml
    apply:
      delegate_to: localhost
      tags:
        - awx
        - awx.build
  tags:
    - awx
    - awx.build
    - awx.build.awx
    - awx.build.receptor

- name: "wp-veritas images and build configs on {{ wp_veritas_build_namespace }}"
  when: "ansible_oc_namespace == wp_veritas_build_namespace"
  include_tasks:
    file: wp-veritas-builds.yml
    apply:
      delegate_to: localhost
      tags:
        - wpveritas
        - wp-veritas
  tags:
    - wpveritas
    - wpveritas.build
    - wp-veritas
    - wp-veritas.build

- name: "AWX images promoted from {{ awx_build_namespace }}"
  when: "ansible_oc_namespace != awx_build_namespace"
  include_tasks:
    file: _promote_image.yml
    apply:
      delegate_to: localhost
      tags:
        - awx
        - awx.promote
  tags:
    - awx
    - awx.promote
  vars:
    promote_image_name: "{{ item.name }}"
    promote_image_tag: "{{ item.version }}"
    promote_from_namespace: "{{ awx_build_namespace }}"
  with_items:
    - name: "{{ awx_image_name }}"
      version: "{{ awx_version }}"
    - name: "{{ awx_receptor_image_name }}"
      version: "{{ awx_receptor_version }}"
    - name: "{{ awx_ee_image_name }}"
      version: "{{ awx_ee_version }}"
  # 💡 Other image promotion tasks (for “core” WordPress serving and
  # cron images) can be found in
  # ../../wordpress-openshift-namespace/tasks/images.yml (under tag
  # `-t images.promote`)

- name: "AWX pods and related OpenShift objects"
  import_tasks: awx.yml
  delegate_to: localhost
  tags:
    - awx
    - awx.run

- name: "AWX database operations"
  include_tasks:
    file: ops.yml
    apply:
      delegate_to: localhost
  # These tags are *not* auto-applied down, since we use an
  # include_tasks rather than an import_tasks or include directive.
  # This means that every task in awx-ops.yml must have its own
  # specific set of tags.
  tags:
    - awx.dump
    - awx.restore

- name: Run Django magic to upgrade all the things
  shell: |
    set -e -x
    awx-manage migrate
    awx-manage create_preload_data
    awx-manage register_default_execution_environments
  register: _migrate
  changed_when: >-
    ("stdout" in _migrate)
    and
    (
      ("No migrations to apply" not in _migrate.stdout)
    or
      ("changed: True" in _migrate.stdout)
    )
  tags:
    - awx
    - awx.migrate
    - awx.seed

- name: "AWX front-end authentication"
  import_tasks: auth.yml
  tags:
    - awx
    - awx.auth

- name: Set up Django objects used by AWX
  include_tasks:
    file: awx-objects.yml
    apply:
      tags:
      - awx
      - awx.objects
  tags:
    - awx
    - awx.objects
    - awx.objects.wpveritas
    - awx.objects.wpveritas.renewtoken

- name: wp-veritas
  when: >-
    ansible_oc_namespace not in ("wwp-infra",)
  include_tasks:
    file: wp-veritas.yml
    apply:
      delegate_to: localhost
      tags:
      - wpveritas
      - wp-veritas
      - awx.wpveritas
      - awx.wp-veritas
  tags:
    - wpveritas
    - wp-veritas
    - awx.wpveritas
    - awx.wp-veritas

- name: "Pushgateway (for backup stats)"
  when: ansible_oc_namespace == "wwp-infra"
  delegate_to: localhost
  vars:
    openshift_namespace: "{{ ansible_oc_namespace }}"
  import_tasks: pushgateway.yml
  tags:
    - awx
    - awx.pushgateway
